# Training configuration for all models
# Based on experimental protocol v3.0

# Data
data:
  corpus: "WikiText-103"
  sequence_length: 256
  tokenizer: "gpt2"  # GPT-2 BPE, shared across ALL models
  vocab_size: 50257
  
# Training hyperparameters
training:
  objective: "next_token_prediction"
  optimizer: "AdamW"
  lr: 3e-4
  lr_schedule: "cosine"
  final_lr: 3e-5
  weight_decay: 0.1
  batch_size: 64
  gradient_clip: 1.0
  total_tokens: 1000000000  # ~1B tokens (~10 epochs over WikiText-103)
  eval_interval: 10000
  save_interval: 50000
  early_stopping_patience: 5
  
# Convergence target
convergence:
  target_perplexity: 60.0  # Validation perplexity < 60
  min_epochs: 5
  
# Model sizes (parameters in millions)
models:
  gpt2_small:
    n_layer: 12
    n_head: 8
    n_embd: 512
    params: ~20-40M
    
  mamba_small:
    d_model: 512
    n_layer: 12
    d_state: 16
    d_conv: 4
    expand: 2
    params: ~20-40M
    
  rwkv_small:
    n_layer: 12
    n_embd: 512
    params: ~20-40M
    
  dem:
    model_dim: 512
    n_mixing_blocks: 8
    delay_pattern: [1, 2, 4, 8, 16, 32]
    buffer_size: 64
    params: ~10-20M

# Seeds
seeds: [0, 1, 2, 3, 4]  # 5 seeds per architecture

# Paths
paths:
  data_dir: "./data"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
  wiki103_path: "./data/wikitext-103"
